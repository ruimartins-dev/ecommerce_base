; Local development PHP configuration applied on top of php-fpm defaults.
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 120

; OPcache: enabled for FPM, disabled validation timestamps off so code changes
; are always picked up during development.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Show errors in local dev (Laravel still controls display via APP_DEBUG).
error_reporting = E_ALL
display_errors = On

