; Local development PHP configuration applied on top of php-fpm defaults.
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 120

; OPcache: enabled for FPM. Code changes are still picked up because
; validate_timestamps stays on, but we only re-stat files every few seconds
; instead of on EVERY request. On a Windows/Docker Desktop bind mount each
; stat() call is very expensive, so revalidate_freq=0 made every page do a
; filesystem stat for every loaded PHP file -> seconds of latency per request.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
; Bigger OPcache so the whole framework + vendor tree stays cached.
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 30000
; Avoid an extra fstat per include by trusting the cached file size.
opcache.enable_file_override = 1

; ---------------------------------------------------------------------------
; realpath cache: Laravel resolves a huge number of paths per request. Over a
; bind mount these lookups are the main bottleneck, so cache them aggressively.
; ---------------------------------------------------------------------------
realpath_cache_size = 16M
realpath_cache_ttl = 600

; Show errors in local dev (Laravel still controls display via APP_DEBUG).
error_reporting = E_ALL
display_errors = On

