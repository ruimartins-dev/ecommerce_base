###############################################################################
# Nginx vhost serving the Laravel public/ directory and proxying PHP to the
# php-fpm "app" container over the internal docker network (app:9000).
###############################################################################
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # "app" is the php-fpm service name in docker-compose.yml.
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny access to hidden files except the ACME challenge directory.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

